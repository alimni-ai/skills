<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>علّمني — Alimni AI · Arabic AI Engineering Academy</title>
  <meta name="description" content="أكاديمية عربية للذكاء الاصطناعي والبرمجة الذكية. مهارات قابلة للتنفيذ مباشرة على أدواتك. قريبًا.">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:title" content="علّمني — Alimni AI">
  <meta property="og:description" content="Arabic AI Engineering Academy. Coming soon.">
  <meta property="og:locale" content="ar">
  <meta property="og:type" content="website">
  <style>
    :root { --bg: #0b0d10; --fg: #f5f1e8; --accent: #d4a574; --muted: #7a7065; --line: #1f2227; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Amiri', 'Noto Naskh Arabic', 'Times New Roman', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.7;
    }
    .card {
      max-width: 640px;
      text-align: center;
    }
    .logo-ar {
      font-size: clamp(4rem, 12vw, 7rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--accent);
      margin-bottom: 1.5rem;
      line-height: 1;
    }
    .tagline-ar {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
      color: var(--fg);
    }
    .soon-ar {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 3rem;
    }
    .divider {
      height: 1px;
      background: var(--line);
      margin: 2rem auto;
      max-width: 200px;
    }
    .latin {
      direction: ltr;
      font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace;
      font-size: 0.95rem;
      color: var(--muted);
    }
    .latin .brand { color: var(--fg); font-weight: 600; }
    .contact {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: var(--muted);
      direction: ltr;
    }
    .contact a {
      color: var(--accent);
      text-decoration: none;
    }
    .contact a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1 class="logo-ar" aria-label="Alimni AI">علّمني</h1>
    <p class="tagline-ar">علّمني الذكاء الاصطناعي بالعربية</p>
    <p class="soon-ar">أكاديمية عربية لأدوات البرمجة الذكية. قريبًا.</p>

    <div class="divider" role="separator" aria-hidden="true"></div>

    <p class="latin"><span class="brand">Alimni&nbsp;AI</span> — Teach me AI, in Arabic.</p>
    <p class="latin">Arabic AI Engineering Academy. Coming soon.</p>

    <p class="contact">
      <a href="mailto:hello@alimni-ai.com">hello@alimni-ai.com</a>
    </p>
  </main>
</body>
</html>
